<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekisteröidy - Yoro.fi</title>
    <script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div class="form-container">
        <h2>Rekisteröidy käyttäjäksi</h2>
        <form onsubmit="registerUser(); return false;">
            <label for="registerEmail">Sähköposti</label>
            <input type="email" id="registerEmail" placeholder="Sähköposti" required>
            <label for="registerPassword">Salasana</label>
            <input type="password" id="registerPassword" placeholder="Salasana" required>
            <button type="submit">Rekisteröidy</button>
        </form>
    </div>
</body>
</html>
