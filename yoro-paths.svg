<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 310" aria-hidden="true">
  <defs>
    <filter id="neon-cyan" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="neon-purple" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="neon-magenta" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="neon-origin" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- drawBranchingPathsArt(origin 240, 278) -->
  <path d="M240 278 Q145 158 110 68" fill="none" stroke="#22d3ee" stroke-width="3.5" stroke-linecap="round" filter="url(#neon-cyan)"/>
  <path d="M240 278 Q240 138 240 28" fill="none" stroke="#a78bfa" stroke-width="3.5" stroke-linecap="round" filter="url(#neon-purple)"/>
  <path d="M240 278 Q335 158 370 68" fill="none" stroke="#c084fc" stroke-width="3.5" stroke-linecap="round" filter="url(#neon-magenta)"/>

  <circle cx="240" cy="278" r="8" fill="#22d3ee" filter="url(#neon-origin)"/>

  <g filter="url(#neon-cyan)">
    <circle cx="110" cy="68" r="34" fill="#0b0f1a" fill-opacity="0.92" stroke="#22d3ee" stroke-width="2"/>
  </g>
  <text x="110" y="69" text-anchor="middle" dominant-baseline="middle" font-size="28">??</text>

  <g filter="url(#neon-purple)">
    <circle cx="240" cy="28" r="34" fill="#0b0f1a" fill-opacity="0.92" stroke="#a78bfa" stroke-width="2"/>
  </g>
  <text x="240" y="29" text-anchor="middle" dominant-baseline="middle" font-size="28">??</text>

  <g filter="url(#neon-magenta)">
    <circle cx="370" cy="68" r="34" fill="#0b0f1a" fill-opacity="0.92" stroke="#c084fc" stroke-width="2"/>
  </g>
  <text x="370" y="69" text-anchor="middle" dominant-baseline="middle" font-size="28">??</text>
</svg>
