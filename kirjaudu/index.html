<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirjaudu - Yoro.fi</title>
    <script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div class="form-container">
        <h2>Kirjaudu sisään</h2>
        <form onsubmit="loginUser(); return false;">
            <label for="loginEmail">Sähköposti</label>
            <input type="email" id="loginEmail" placeholder="Sähköposti" required>
            <label for="loginPassword">Salasana</label>
            <input type="password" id="loginPassword" placeholder="Salasana" required>
            <button type="submit">Kirjaudu</button>
            <button type="button" id="forgotPasswordBtn" onclick="forgotPassword()">Unohtuiko salasana?</button>
        </form>
    </div>
    <!-- Uloskirjautumisnappi, näytä vain jos käyttäjä on kirjautunut -->
    <button id="logoutBtn" onclick="logoutUser()" style="display:none;">Kirjaudu ulos</button>
</body>
</html>
