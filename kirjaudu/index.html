<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirjaudu - Yoro.fi</title>
    <script defer src="/firebaseConfig.js"></script>
    <script defer src="/auth.js"></script>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div class="form-container">
        <h2>Kirjaudu sisään</h2>
        <input type="email" id="loginEmail" placeholder="Sähköposti">
        <input type="password" id="loginPassword" placeholder="Salasana">
        <button onclick="loginUser()">Kirjaudu</button>
        <button id="forgotPasswordBtn" onclick="forgotPassword()">Unohtuiko salasana?</button>
    </div>
    <!-- Uloskirjautumisnappi, näytä vain jos käyttäjä on kirjautunut -->
    <button id="logoutBtn" onclick="logoutUser()" style="display:none;">Kirjaudu ulos</button>
</body>
</html>
